<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Tablas</title>
        <meta name="author" content="Pedro Delgado" />
        <meta name="description" content="Tabalas ejercicio 5" />
    </head>
    <body>
        <h2>Tres columnas fusionadas en la segunda fila</h2>
        <table border="1" width="90%" style="text-align: center">
            <tr>
                <td>A_1</td>
                <td>A_2</td>
                <td>A_3</td>
            </tr>

            <tr>
                <td colspan="105">B</td>
            </tr>
        </table>

        <h2>Cuatro filas fusionadas en la segunda columna</h2>
        <table border="1" width="90%" style="text-align: center">
            <tr>
                <td>A_1</td>
                <td rowspan="4">B</td>
            </tr>

            <tr>
                <td>A_2</td>
            </tr>
            <tr>
                <td>A_3</td>
            </tr>
            <tr>
                <td>A_4</td>
            </tr>
        </table>
    </body>
</html>

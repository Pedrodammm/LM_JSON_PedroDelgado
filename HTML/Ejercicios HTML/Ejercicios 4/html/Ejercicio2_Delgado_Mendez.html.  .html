<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="author" content="Juanan Profe" />
        <meta name="description" content="Ejemplo de formularios en Lenguaje de Marcas" />
        <title>Ejercicio Formularios</title>
    </head>
    <body>
        <h1>Envíanos tu información</h1>
        <h2>Te contestaremos lo antes posible</h2>
        <form method="post" action="insertaDatos.php">
            <fieldset>
                <p>
                    <label>
                        Nombre y apellidos <br />
                        <input type="text" name="nom_ap" size="20" maxlength="50" />
                    </label>
                </p>
                <p>
                    <label for="dni">DNI</label> <br />
                    <input type="text" name="dni" id="dni" required />
                </p>

                <p>
                    Identidad de género <br />
                    <input type="radio" name="genero" id="hombre" />Hombre<br />
                    <input type="radio" name="genero" id="mujer" />Mujer<br />
                    <input type="radio" name="genero" id="gen_desconocido" />Prefiero no decirlo
                </p>

                <p>Incluye una foto <input type="file" /></p>

                <p>
                    <input type="checkbox" name="condiciones" value="si" required />He entendido y acepto las
                    condiciones de uso
                </p>

                <p><input type="checkbox" name="publicidad" value="si" default="no"/>Acepto recibir publicidad</p>
            </fieldset>
            <p>
                <input type="submit" value="Guardar cambios" />
                <input type="reset" value="Borrar los datos" />
            </p>
        </form>
    </body>
</html>
